[plugin]
id = "voiceprint"
name = "声纹比对插件"
description = "基于MFCC特征的轻量级声纹识别，无需下载大型模型，直接录音比对两段音频是否为同一人"
version = "3.0.0"
entry = "plugins.voiceprint:VoiceprintPlugin"

[plugin.sdk]
recommended = ">=0.1.0,<0.2.0"
supported = ">=0.1.0,<0.3.0"

[plugin.dependencies]
scipy = "*"
numpy = "*"
soundfile = "*"
