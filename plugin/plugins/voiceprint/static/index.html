<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>声纹比对 - N.E.K.O.</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 24px;
            padding: 40px;
            max-width: 480px;
            width: 100%;
            box-shadow: 0 25px 80px rgba(0, 0, 0, 0.4);
        }

        .header {
            text-align: center;
            margin-bottom: 32px;
        }

        .header h1 {
            font-size: 28px;
            font-weight: 700;
            color: #1a1a2e;
            margin-bottom: 8px;
        }

        .header p {
            font-size: 14px;
            color: #666;
        }

        .record-section {
            margin-bottom: 24px;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 16px;
            transition: all 0.3s ease;
        }

        .record-section:hover {
            background: #f0f1f3;
        }

        .record-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 16px;
        }

        .record-title {
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: 600;
            font-size: 16px;
            color: #333;
        }

        .record-badge {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            font-weight: 700;
            color: white;
        }

        .record-badge.audio1 {
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
        }

        .record-badge.audio2 {
            background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%);
        }

        .record-status {
            font-size: 13px;
            padding: 4px 12px;
            border-radius: 20px;
            background: #e5e7eb;
            color: #6b7280;
            transition: all 0.3s ease;
        }

        .record-status.recorded {
            background: #d1fae5;
            color: #059669;
        }

        .record-btn {
            width: 100%;
            padding: 20px;
            border: none;
            border-radius: 16px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            position: relative;
            overflow: hidden;
        }

        .record-btn.audio1 {
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
            color: white;
            box-shadow: 0 4px 15px rgba(16, 185, 129, 0.4);
        }

        .record-btn.audio2 {
            background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%);
            color: white;
            box-shadow: 0 4px 15px rgba(59, 130, 246, 0.4);
        }

        .record-btn:hover:not(:disabled) {
            transform: translateY(-2px);
        }

        .record-btn:active:not(:disabled),
        .record-btn.recording {
            transform: scale(0.98);
        }

        .record-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .record-btn.recording {
            animation: pulse-recording 1.5s infinite;
        }

        @keyframes pulse-recording {
            0%, 100% {
                box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7);
            }
            50% {
                box-shadow: 0 0 0 15px rgba(239, 68, 68, 0);
            }
        }

        .record-btn.recording.audio1 {
            background: linear-gradient(135deg, #ef4444 0%, #dc2626 100%);
        }

        .record-btn.recording.audio2 {
            background: linear-gradient(135deg, #ef4444 0%, #dc2626 100%);
        }

        .icon-mic {
            width: 24px;
            height: 24px;
        }

        .wave-container {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 4px;
            height: 24px;
        }

        .wave-bar {
            width: 4px;
            height: 8px;
            background: white;
            border-radius: 2px;
            animation: wave 0.6s infinite;
        }

        .wave-bar:nth-child(1) { animation-delay: 0s; }
        .wave-bar:nth-child(2) { animation-delay: 0.1s; }
        .wave-bar:nth-child(3) { animation-delay: 0.2s; }
        .wave-bar:nth-child(4) { animation-delay: 0.3s; }
        .wave-bar:nth-child(5) { animation-delay: 0.4s; }

        @keyframes wave {
            0%, 100% { height: 8px; }
            50% { height: 20px; }
        }

        .compare-section {
            margin-top: 32px;
        }

        .compare-btn {
            width: 100%;
            padding: 20px;
            border: none;
            border-radius: 16px;
            background: linear-gradient(135deg, #ec4899 0%, #db2777 100%);
            color: white;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            box-shadow: 0 4px 15px rgba(236, 72, 153, 0.4);
        }

        .compare-btn:hover:not(:disabled) {
            transform: translateY(-2px);
        }

        .compare-btn:disabled {
            background: #d1d5db;
            box-shadow: none;
            cursor: not-allowed;
        }

        .result-container {
            margin-top: 24px;
            padding: 24px;
            border-radius: 16px;
            text-align: center;
            display: none;
        }

        .result-container.show {
            display: block;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .result-container.same {
            background: linear-gradient(135deg, #d1fae5 0%, #a7f3d0 100%);
            border: 2px solid #10b981;
        }

        .result-container.diff {
            background: linear-gradient(135deg, #fee2e2 0%, #fecaca 100%);
            border: 2px solid #ef4444;
        }

        .result-container.error {
            background: linear-gradient(135deg, #fef3c7 0%, #fde68a 100%);
            border: 2px solid #f59e0b;
        }

        .result-icon {
            font-size: 48px;
            margin-bottom: 12px;
        }

        .result-text {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .result-container.same .result-text {
            color: #059669;
        }

        .result-container.diff .result-text {
            color: #dc2626;
        }

        .result-container.error .result-text {
            color: #d97706;
        }

        .similarity {
            font-size: 16px;
            color: #666;
            margin-top: 8px;
        }

        .similarity-value {
            font-weight: 700;
            font-size: 20px;
        }

        .result-container.same .similarity-value {
            color: #059669;
        }

        .result-container.diff .similarity-value {
            color: #dc2626;
        }

        .instructions {
            margin-top: 24px;
            padding: 16px;
            background: #f0f9ff;
            border-radius: 12px;
            font-size: 13px;
            color: #0369a1;
        }

        .instructions h3 {
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .instructions ol {
            margin-left: 20px;
            line-height: 1.8;
        }

        .loading-spinner {
            width: 24px;
            height: 24px;
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>声纹比对</h1>
            <p>基于 MFCC 特征的轻量级声纹识别，无需下载模型</p>
        </div>

        <div class="record-section">
            <div class="record-header">
                <div class="record-title">
                    <span class="record-badge audio1">1</span>
                    <span>第一段音频</span>
                </div>
                <span class="record-status" id="status1">请录音</span>
            </div>
            <button class="record-btn audio1" id="btn1" onmousedown="startRecord(1)" onmouseup="stopRecord(1)" ontouchstart="startRecord(1)" ontouchend="stopRecord(1)">
                <svg class="icon-mic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"></path>
                    <path d="M19 10v2a7 7 0 0 1-14 0v-2"></path>
                    <line x1="12" y1="19" x2="12" y2="23"></line>
                    <line x1="8" y1="23" x2="16" y2="23"></line>
                </svg>
                <span id="btn1Text">按住说话</span>
            </button>
        </div>

        <div class="record-section">
            <div class="record-header">
                <div class="record-title">
                    <span class="record-badge audio2">2</span>
                    <span>第二段音频</span>
                </div>
                <span class="record-status" id="status2">请录音</span>
            </div>
            <button class="record-btn audio2" id="btn2" onmousedown="startRecord(2)" onmouseup="stopRecord(2)" ontouchstart="startRecord(2)" ontouchend="stopRecord(2)">
                <svg class="icon-mic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"></path>
                    <path d="M19 10v2a7 7 0 0 1-14 0v-2"></path>
                    <line x1="12" y1="19" x2="12" y2="23"></line>
                    <line x1="8" y1="23" x2="16" y2="23"></line>
                </svg>
                <span id="btn2Text">按住说话</span>
            </button>
        </div>

        <div class="compare-section">
            <button class="compare-btn" id="compareBtn" onclick="compareVoice()">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="11" cy="11" r="8"></circle>
                    <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                </svg>
                <span id="compareBtnText">开始比对</span>
            </button>
        </div>

        <div class="result-container" id="resultContainer">
            <div class="result-icon" id="resultIcon"></div>
            <div class="result-text" id="resultText"></div>
            <div class="similarity" id="similarityText"></div>
        </div>

        <div class="instructions">
            <h3>
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="12" cy="12" r="10"></circle>
                    <line x1="12" y1="16" x2="12" y2="12"></line>
                    <line x1="12" y1="8" x2="12.01" y2="8"></line>
                </svg>
                使用说明
            </h3>
            <ol>
                <li>按住 <strong>第一段音频</strong> 按钮，录制第一段声音</li>
                <li>按住 <strong>第二段音频</strong> 按钮，录制第二段声音</li>
                <li>点击 <strong>开始比对</strong> 按钮进行声纹比对</li>
                <li>系统将判断两段音频是否为同一人</li>
            </ol>
        </div>
    </div>

    <script>
        let mediaRecorder;
        let audioChunks = [];
        let audio1Data = null;
        let audio2Data = null;
        let currentAudio = null;
        let isRecording = false;

        async function startRecord(num) {
            event.preventDefault();
            if (isRecording) return;

            const btn = document.getElementById('btn' + num);
            const btnText = document.getElementById('btn' + num + 'Text');
            const status = document.getElementById('status' + num);

            isRecording = true;
            btn.classList.add('recording');
            btnText.innerHTML = '<div class="wave-container"><span class="wave-bar"></span><span class="wave-bar"></span><span class="wave-bar"></span><span class="wave-bar"></span><span class="wave-bar"></span></div>';
            status.textContent = '正在录音...';
            status.className = 'record-status';

            audioChunks = [];
            currentAudio = num;

            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                mediaRecorder = new MediaRecorder(stream, {
                    mimeType: 'audio/webm;codecs=opus'
                });

                mediaRecorder.ondataavailable = (e) => {
                    if (e.data.size > 0) {
                        audioChunks.push(e.data);
                    }
                };

                mediaRecorder.onstop = async () => {
                    const audioBlob = new Blob(audioChunks, { type: 'audio/webm' });

                    // 转换为 WAV 格式
                    const arrayBuffer = await audioBlob.arrayBuffer();
                    const wavBuffer = await convertToWav(arrayBuffer);
                    const base64 = arrayBufferToBase64(wavBuffer);

                    if (currentAudio === 1) {
                        audio1Data = base64;
                        status.textContent = '✓ 已录制';
                    } else {
                        audio2Data = base64;
                        status.textContent = '✓ 已录制';
                    }
                    status.className = 'record-status recorded';

                    // 停止所有轨道
                    stream.getTracks().forEach(track => track.stop());

                    updateCompareButton();
                    resetButton(num);
                };

                mediaRecorder.start();
            } catch (err) {
                console.error('录音失败:', err);
                status.textContent = '录音失败: ' + err.message;
                resetButton(num);
            }
        }

        function stopRecord(num) {
            event.preventDefault();
            if (!isRecording || !mediaRecorder || mediaRecorder.state !== 'recording') return;

            isRecording = false;
            mediaRecorder.stop();
        }

        async function convertToWav(arrayBuffer) {
            const audioContext = new (window.AudioContext || window.webkitAudioContext)();
            const audioBuffer = await audioContext.decodeAudioData(arrayBuffer);

            const numberOfChannels = 1;
            const sampleRate = 16000;
            const bitsPerSample = 16;

            // 重采样到16kHz
            const duration = audioBuffer.duration;
            const samples = Math.floor(duration * sampleRate);
            const buffer = audioContext.createBuffer(numberOfChannels, samples, sampleRate);
            const channelData = buffer.getChannelData(0);

            const originalData = audioBuffer.getChannelData(0);
            const ratio = audioBuffer.sampleRate / sampleRate;

            for (let i = 0; i < samples; i++) {
                const srcIndex = i * ratio;
                const srcIndexFloor = Math.floor(srcIndex);
                const srcIndexCeil = Math.min(srcIndexFloor + 1, originalData.length - 1);
                const t = srcIndex - srcIndexFloor;
                channelData[i] = originalData[srcIndexFloor] * (1 - t) + originalData[srcIndexCeil] * t;
            }

            // 编码为WAV
            const wavBuffer = encodeWav(buffer, bitsPerSample);
            return wavBuffer;
        }

        function encodeWav(audioBuffer, bitsPerSample) {
            const numChannels = 1;
            const sampleRate = audioBuffer.sampleRate;
            const bytesPerSample = bitsPerSample / 8;
            const blockAlign = numChannels * bytesPerSample;
            const byteRate = sampleRate * blockAlign;
            const dataSize = audioBuffer.length * bytesPerSample;
            const buffer = new ArrayBuffer(44 + dataSize);
            const view = new DataView(buffer);

            // RIFF header
            writeString(view, 0, 'RIFF');
            view.setUint32(4, 36 + dataSize, true);
            writeString(view, 8, 'WAVE');

            // fmt chunk
            writeString(view, 12, 'fmt ');
            view.setUint32(16, 16, true);
            view.setUint16(20, 1, true);
            view.setUint16(22, numChannels, true);
            view.setUint32(24, sampleRate, true);
            view.setUint32(28, byteRate, true);
            view.setUint16(32, blockAlign, true);
            view.setUint16(34, bitsPerSample, true);

            // data chunk
            writeString(view, 36, 'data');
            view.setUint32(40, dataSize, true);

            // Write audio data
            const channelData = audioBuffer.getChannelData(0);
            let offset = 44;
            for (let i = 0; i < channelData.length; i++) {
                const sample = Math.max(-1, Math.min(1, channelData[i]));
                view.setInt16(offset, sample < 0 ? sample * 0x8000 : sample * 0x7FFF, true);
                offset += 2;
            }

            return buffer;
        }

        function writeString(view, offset, string) {
            for (let i = 0; i < string.length; i++) {
                view.setUint8(offset + i, string.charCodeAt(i));
            }
        }

        function arrayBufferToBase64(buffer) {
            const bytes = new Uint8Array(buffer);
            let binary = '';
            for (let i = 0; i < bytes.byteLength; i++) {
                binary += String.fromCharCode(bytes[i]);
            }
            return btoa(binary);
        }

        function resetButton(num) {
            const btn = document.getElementById('btn' + num);
            const btnText = document.getElementById('btn' + num + 'Text');
            btn.classList.remove('recording');
            btnText.innerHTML = '按住说话';
        }

        function updateCompareButton() {
            const btn = document.getElementById('compareBtn');
            btn.disabled = !(audio1Data && audio2Data);
        }

        async function compareVoice() {
            const resultContainer = document.getElementById('resultContainer');
            const btn = document.getElementById('compareBtn');
            const btnText = document.getElementById('compareBtnText');

            if (!audio1Data || !audio2Data) {
                showResult('error', '请先录制两段音频', '');
                return;
            }

            btn.disabled = true;
            btnText.innerHTML = '<div class="loading-spinner"></div> 比对中...';
            resultContainer.className = 'result-container';
            resultContainer.style.display = 'none';

            try {
                const response = await fetch('/api/plugin/voiceprint/compare', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        audio1: audio1Data,
                        audio2: audio2Data
                    })
                });

                const data = await response.json();

                if (data.result === '是') {
                    showResult('same', '同一个人', `相似度: <span class="similarity-value">${data.similarity}</span> | 置信度: ${data.confidence}`);
                } else if (data.result === '不是') {
                    showResult('diff', '不同的人', `相似度: <span class="similarity-value">${data.similarity}</span> | 置信度: ${data.confidence}`);
                } else {
                    showResult('error', '比对失败', data.error || '未知错误');
                }
            } catch (err) {
                showResult('error', '比对失败', err.message);
            }

            btn.disabled = false;
            btnText.innerHTML = '开始比对';
        }

        function showResult(type, text, similarity) {
            const resultContainer = document.getElementById('resultContainer');
            const resultIcon = document.getElementById('resultIcon');
            const resultText = document.getElementById('resultText');
            const similarityText = document.getElementById('similarityText');

            resultContainer.className = 'result-container ' + type + ' show';

            if (type === 'same') {
                resultIcon.textContent = '🎉';
            } else if (type === 'diff') {
                resultIcon.textContent = '❌';
            } else {
                resultIcon.textContent = '⚠️';
            }

            resultText.textContent = text;
            similarityText.innerHTML = similarity;
        }
    </script>
</body>
</html>
