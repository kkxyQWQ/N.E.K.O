[plugin]
id          = "voice_compare"
name        = "声音比对"
description = """
轻量级声纹识别插件，基于 MFCC + 余弦相似度，无需下载任何模型。
支持：
  · compare  — 直接比对两段音频是否同一人
  · enroll   — 注册主人声纹（持久化）
  · verify   — 验证是否为主人
  · status   — 查询状态
  · clear    — 清除注册声纹
  · threshold — 调整判定阈值
附带网页 UI，可视化录音比对。
"""
version = "1.0.0"
entry   = "plugins.voice_compare:VoiceComparePlugin"

[plugin.sdk]
recommended = ">=0.1.0,<0.2.0"
supported   = ">=0.1.0,<0.3.0"

dependencies = ["numpy", "scipy"]
