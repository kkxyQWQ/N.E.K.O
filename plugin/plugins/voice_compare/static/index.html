<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>声音比对 · N.E.K.O.</title>
  <style>
    /* ═══════════════════════════════════════════════════════
       Reset & 全局
    ═══════════════════════════════════════════════════════ */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --c-bg:      #0d0d1a;
      --c-surface: rgba(255,255,255,0.04);
      --c-border:  rgba(255,255,255,0.08);
      --c-text:    #e8eaf0;
      --c-sub:     #8890a4;
      --c-green:   #00d68f;
      --c-blue:    #4d9fff;
      --c-purple:  #a78bfa;
      --c-red:     #ff6b6b;
      --c-yellow:  #ffd166;
      --radius:    16px;
      --radius-sm: 10px;
    }

    body {
      min-height: 100vh;
      background: var(--c-bg);
      background-image:
        radial-gradient(ellipse 80% 50% at 20% -10%, rgba(80,40,160,.35) 0%, transparent 60%),
        radial-gradient(ellipse 60% 40% at 80% 110%, rgba(0,150,255,.20) 0%, transparent 55%);
      color: var(--c-text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
                   "Noto Sans SC", "Microsoft YaHei", sans-serif;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 32px 16px 48px;
    }

    /* ═══════════════════════════════════════════════════════
       卡片容器
    ═══════════════════════════════════════════════════════ */
    .app {
      width: 100%;
      max-width: 480px;
    }

    /* ── 顶部标题 ── */
    .hero {
      text-align: center;
      margin-bottom: 28px;
    }
    .hero-icon {
      font-size: 52px;
      line-height: 1;
      margin-bottom: 12px;
      filter: drop-shadow(0 0 20px rgba(167,139,250,.5));
    }
    .hero h1 {
      font-size: 24px;
      font-weight: 800;
      letter-spacing: -.5px;
      background: linear-gradient(135deg, #a78bfa, #60a5fa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .hero p {
      margin-top: 6px;
      font-size: 13px;
      color: var(--c-sub);
    }

    /* ── Tab 栏 ── */
    .tabs {
      display: flex;
      gap: 4px;
      background: var(--c-surface);
      border: 1px solid var(--c-border);
      border-radius: var(--radius);
      padding: 5px;
      margin-bottom: 20px;
    }
    .tab {
      flex: 1;
      padding: 9px 0;
      border: none;
      border-radius: var(--radius-sm);
      background: transparent;
      color: var(--c-sub);
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: all .2s;
    }
    .tab.active {
      background: rgba(167,139,250,.18);
      color: var(--c-purple);
    }

    /* ── 面板 ── */
    .panel { display: none; }
    .panel.active { display: flex; flex-direction: column; gap: 14px; }

    /* ── 卡片 ── */
    .card {
      background: var(--c-surface);
      border: 1px solid var(--c-border);
      border-radius: var(--radius);
      padding: 18px;
    }
    .card-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 14px;
    }
    .card-label {
      display: flex;
      align-items: center;
      gap: 9px;
      font-size: 14px;
      font-weight: 700;
      color: var(--c-text);
    }
    .num-badge {
      width: 26px; height: 26px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 12px; font-weight: 800;
    }
    .nb-green  { background: rgba(0,214,143,.2);  color: var(--c-green);  }
    .nb-blue   { background: rgba(77,159,255,.2); color: var(--c-blue);   }
    .nb-purple { background: rgba(167,139,250,.2);color: var(--c-purple); }

    /* ── 状态胶囊 ── */
    .pill {
      font-size: 11.5px;
      padding: 3px 10px;
      border-radius: 20px;
      background: rgba(255,255,255,.07);
      color: var(--c-sub);
      transition: all .25s;
      white-space: nowrap;
    }
    .pill.ok  { background: rgba(0,214,143,.15); color: var(--c-green); }
    .pill.rec { background: rgba(255,107,107,.15); color: var(--c-red);  }

    /* ── 录音按钮 ── */
    .rec-btn {
      width: 100%;
      padding: 16px;
      border: none; border-radius: var(--radius-sm);
      font-size: 14.5px; font-weight: 700; color: #fff;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center; gap: 10px;
      transition: transform .15s, opacity .15s;
      user-select: none; -webkit-user-select: none;
      position: relative; overflow: hidden;
    }
    .rec-btn::before {
      content: '';
      position: absolute; inset: 0;
      background: rgba(255,255,255,0);
      transition: background .15s;
    }
    .rec-btn:hover:not(:disabled)::before  { background: rgba(255,255,255,.08); }
    .rec-btn:active:not(:disabled)         { transform: scale(.98); }
    .rec-btn:disabled                      { opacity: .4; cursor: not-allowed; }

    .rb-green  { background: linear-gradient(135deg,#00b377,#00d68f); box-shadow:0 4px 20px rgba(0,214,143,.25); }
    .rb-blue   { background: linear-gradient(135deg,#2563eb,#4d9fff); box-shadow:0 4px 20px rgba(77,159,255,.25); }
    .rb-purple { background: linear-gradient(135deg,#7c3aed,#a78bfa); box-shadow:0 4px 20px rgba(167,139,250,.25); }

    .rec-btn.recording {
      background: linear-gradient(135deg,#b91c1c,#ff6b6b) !important;
      box-shadow: none !important;
      animation: pulse-red 1.3s infinite;
    }
    @keyframes pulse-red {
      0%,100% { box-shadow: 0 0 0 0 rgba(255,107,107,.5); }
      50%      { box-shadow: 0 0 0 10px rgba(255,107,107,0); }
    }

    /* ── 波形动画 ── */
    .waves { display:flex; align-items:center; gap:3px; }
    .w {
      width: 3px; background: rgba(255,255,255,.8); border-radius: 2px;
      animation: wv .5s ease-in-out infinite alternate;
    }
    .w:nth-child(1){height:6px;  animation-delay:0s}
    .w:nth-child(2){height:12px; animation-delay:.08s}
    .w:nth-child(3){height:18px; animation-delay:.16s}
    .w:nth-child(4){height:12px; animation-delay:.24s}
    .w:nth-child(5){height:6px;  animation-delay:.32s}
    @keyframes wv { to { height: 4px; opacity:.4; } }

    /* ── 分隔线 ── */
    .divider {
      height: 1px;
      background: var(--c-border);
      margin: 4px 0;
    }

    /* ── 阈值滑块 ── */
    .slider-wrap {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .slider-wrap label {
      font-size: 13px;
      font-weight: 600;
      color: var(--c-sub);
      white-space: nowrap;
    }
    input[type=range] {
      flex: 1;
      accent-color: var(--c-purple);
      cursor: pointer;
    }
    .slider-val {
      min-width: 40px;
      text-align: center;
      font-size: 13px; font-weight: 700;
      background: rgba(167,139,250,.15);
      color: var(--c-purple);
      border-radius: 8px;
      padding: 3px 8px;
    }

    /* ── 操作按钮 ── */
    .action-btn {
      width: 100%;
      padding: 15px;
      border: none; border-radius: var(--radius-sm);
      font-size: 14.5px; font-weight: 700; color: #fff;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center; gap: 10px;
      transition: transform .15s, opacity .15s;
    }
    .action-btn:hover:not(:disabled) { transform: translateY(-1px); }
    .action-btn:disabled { opacity: .35; cursor: not-allowed; transform: none; }
    .ab-pink   { background: linear-gradient(135deg,#be185d,#ec4899); box-shadow:0 4px 20px rgba(236,72,153,.25); }
    .ab-purple { background: linear-gradient(135deg,#7c3aed,#a78bfa); box-shadow:0 4px 20px rgba(167,139,250,.25); }
    .ab-red    { background: linear-gradient(135deg,#991b1b,#ef4444); box-shadow:0 4px 20px rgba(239,68,68,.2); }

    /* ── 结果卡 ── */
    .result {
      border-radius: var(--radius);
      padding: 22px;
      text-align: center;
      display: none;
      animation: fadeUp .28s ease;
    }
    .result.show { display: block; }
    @keyframes fadeUp {
      from { opacity:0; transform:translateY(8px); }
      to   { opacity:1; transform:translateY(0); }
    }
    .result.same { background:rgba(0,214,143,.1);  border:1.5px solid rgba(0,214,143,.4); }
    .result.diff { background:rgba(255,107,107,.1); border:1.5px solid rgba(255,107,107,.4); }
    .result.err  { background:rgba(255,209,102,.1); border:1.5px solid rgba(255,209,102,.4); }

    .result-icon  { font-size: 40px; margin-bottom: 8px; }
    .result-title { font-size: 20px; font-weight: 800; margin-bottom: 6px; }
    .result.same .result-title { color: var(--c-green);  }
    .result.diff .result-title { color: var(--c-red);    }
    .result.err  .result-title { color: var(--c-yellow); }

    .result-sub   { font-size: 13.5px; color: var(--c-sub); line-height: 1.7; }
    .sim-num      { font-size: 22px; font-weight: 800; }
    .result.same .sim-num { color: var(--c-green); }
    .result.diff .sim-num { color: var(--c-red);   }

    /* ── 状态栏（验证面板顶部） ── */
    .enroll-bar {
      display: flex; align-items: center; gap: 9px;
      padding: 11px 15px;
      background: var(--c-surface);
      border: 1px solid var(--c-border);
      border-radius: var(--radius-sm);
      font-size: 12.5px;
      color: var(--c-sub);
    }
    .dot { width:8px; height:8px; border-radius:50%; flex-shrink:0; }
    .dot.on  { background:var(--c-green); box-shadow:0 0 6px var(--c-green); }
    .dot.off { background: #444; }

    /* ── spinner ── */
    .spinner {
      width: 18px; height: 18px;
      border: 2.5px solid rgba(255,255,255,.25);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin .65s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── 小提示 ── */
    .hint {
      font-size: 12px;
      color: var(--c-sub);
      line-height: 1.8;
      padding: 12px 14px;
      background: rgba(255,255,255,.03);
      border-radius: var(--radius-sm);
      border-left: 3px solid rgba(167,139,250,.4);
    }
    .hint strong { color: var(--c-text); }
  </style>
</head>
<body>
<div class="app">

  <!-- 标题 -->
  <div class="hero">
    <div class="hero-icon">🎙️</div>
    <h1>声音比对</h1>
    <p>MFCC · 余弦相似度 · 无需模型 · N.E.K.O. Plugin</p>
  </div>

  <!-- Tab -->
  <div class="tabs">
    <button class="tab active" onclick="switchTab('compare',this)">直接比对</button>
    <button class="tab"        onclick="switchTab('enroll',this)">注册声纹</button>
    <button class="tab"        onclick="switchTab('verify',this)">验证声纹</button>
  </div>

  <!-- ══════════════════════════════════════════════
       面板 A：直接比对
  ══════════════════════════════════════════════ -->
  <div class="panel active" id="panel-compare">

    <!-- 阈值 -->
    <div class="card">
      <div class="slider-wrap">
        <label>判定阈值</label>
        <input type="range" id="cmp-thr" min="0.1" max="0.9" step="0.05" value="0.5"
               oninput="$('cmp-thr-v').textContent=parseFloat(this.value).toFixed(2)">
        <span class="slider-val" id="cmp-thr-v">0.50</span>
      </div>
    </div>

    <!-- 音频 1 -->
    <div class="card">
      <div class="card-head">
        <div class="card-label">
          <span class="num-badge nb-green">1</span>第一段音频
        </div>
        <span class="pill" id="cmp-p1">等待录音</span>
      </div>
      <button class="rec-btn rb-green" id="cmp-b1"
              onmousedown="startRec('cmp',1)" onmouseup="stopRec('cmp',1)"
              ontouchstart.prevent="startRec('cmp',1)" ontouchend="stopRec('cmp',1)">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round">
          <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
          <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
          <line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/>
        </svg>
        <span id="cmp-b1-t">按住说话</span>
      </button>
    </div>

    <!-- 音频 2 -->
    <div class="card">
      <div class="card-head">
        <div class="card-label">
          <span class="num-badge nb-blue">2</span>第二段音频
        </div>
        <span class="pill" id="cmp-p2">等待录音</span>
      </div>
      <button class="rec-btn rb-blue" id="cmp-b2"
              onmousedown="startRec('cmp',2)" onmouseup="stopRec('cmp',2)"
              ontouchstart.prevent="startRec('cmp',2)" ontouchend="stopRec('cmp',2)">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round">
          <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
          <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
          <line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/>
        </svg>
        <span id="cmp-b2-t">按住说话</span>
      </button>
    </div>

    <!-- 比对按钮 -->
    <button class="action-btn ab-pink" id="cmp-go" onclick="doCompare()" disabled>
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
        <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
      </svg>
      <span id="cmp-go-t">开始比对</span>
    </button>

    <!-- 结果 -->
    <div class="result" id="cmp-result">
      <div class="result-icon" id="cmp-r-icon"></div>
      <div class="result-title" id="cmp-r-title"></div>
      <div class="result-sub" id="cmp-r-sub"></div>
    </div>

    <div class="hint">
      💡 <strong>使用方法：</strong>按住按钮录音，松开自动停止。<br>
      两段都录完后点「开始比对」，系统判断是否同一人。<br>
      阈值越高越严格，推荐 <strong>0.45~0.60</strong>。
    </div>
  </div>

  <!-- ══════════════════════════════════════════════
       面板 B：注册声纹
  ══════════════════════════════════════════════ -->
  <div class="panel" id="panel-enroll">

    <div class="card">
      <div class="card-head">
        <div class="card-label">
          <span class="num-badge nb-purple">声</span>录制主人声纹
        </div>
        <span class="pill" id="enr-p">等待录音</span>
      </div>
      <button class="rec-btn rb-purple" id="enr-b"
              onmousedown="startRec('enr',0)" onmouseup="stopRec('enr',0)"
              ontouchstart.prevent="startRec('enr',0)" ontouchend="stopRec('enr',0)">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round">
          <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
          <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
          <line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/>
        </svg>
        <span id="enr-b-t">按住说话（建议 3 秒以上）</span>
      </button>
    </div>

    <button class="action-btn ab-purple" id="enr-go" onclick="doEnroll()" disabled>
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
        <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/>
        <polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/>
      </svg>
      <span id="enr-go-t">保存声纹</span>
    </button>

    <div class="result" id="enr-result">
      <div class="result-icon" id="enr-r-icon"></div>
      <div class="result-title" id="enr-r-title"></div>
      <div class="result-sub" id="enr-r-sub"></div>
    </div>

    <div class="hint">
      💡 <strong>建议：</strong>录制 3 秒以上的清晰语音效果更好。<br>
      声纹会<strong>持久化保存</strong>，重启插件后仍然有效。
    </div>
  </div>

  <!-- ══════════════════════════════════════════════
       面板 C：验证声纹
  ══════════════════════════════════════════════ -->
  <div class="panel" id="panel-verify">

    <div class="enroll-bar">
      <span class="dot off" id="vfy-dot"></span>
      <span id="vfy-status">正在查询注册状态…</span>
    </div>

    <div class="card">
      <div class="card-head">
        <div class="card-label">
          <span class="num-badge nb-purple">验</span>待验证音频
        </div>
        <span class="pill" id="vfy-p">等待录音</span>
      </div>
      <button class="rec-btn rb-purple" id="vfy-b"
              onmousedown="startRec('vfy',0)" onmouseup="stopRec('vfy',0)"
              ontouchstart.prevent="startRec('vfy',0)" ontouchend="stopRec('vfy',0)">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round">
          <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
          <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
          <line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/>
        </svg>
        <span id="vfy-b-t">按住说话</span>
      </button>
    </div>

    <button class="action-btn ab-purple" id="vfy-go" onclick="doVerify()" disabled>
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
        <polyline points="9 11 12 14 22 4"/>
        <path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/>
      </svg>
      <span id="vfy-go-t">开始验证</span>
    </button>

    <div class="result" id="vfy-result">
      <div class="result-icon" id="vfy-r-icon"></div>
      <div class="result-title" id="vfy-r-title"></div>
      <div class="result-sub" id="vfy-r-sub"></div>
    </div>

    <!-- 危险区 -->
    <div class="card" style="border-color:rgba(255,107,107,.2)">
      <div class="card-label" style="margin-bottom:12px;font-size:13px;color:var(--c-sub)">
        ⚠️ 危险操作
      </div>
      <button class="action-btn ab-red" onclick="doClear()">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
          <polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/>
          <path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4h6v2"/>
        </svg>
        清除已注册声纹
      </button>
    </div>

    <div class="hint">
      💡 <strong>流程：</strong>先去「注册声纹」面板录制并保存主人声音，<br>
      再回到这里录制待验证声音，点「开始验证」即可。
    </div>
  </div>

</div><!-- /app -->

<script>
/* ═══════════════════════════════════════════════════════════
   工具函数
═══════════════════════════════════════════════════════════ */
const $ = id => document.getElementById(id);

function setText(id, html, isHtml=false) {
  const el = $(id);
  if (!el) return;
  isHtml ? (el.innerHTML = html) : (el.textContent = html);
}

/* ═══════════════════════════════════════════════════════════
   Tab 切换
═══════════════════════════════════════════════════════════ */
function switchTab(name, btn) {
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(b => b.classList.remove('active'));
  $('panel-' + name).classList.add('active');
  btn.classList.add('active');
  if (name === 'verify') loadEnrollStatus();
}

/* ═══════════════════════════════════════════════════════════
   录音状态
═══════════════════════════════════════════════════════════ */
const audioData = { cmp1: null, cmp2: null, enr: null, vfy: null };

let recorder   = null;
let chunks     = [];
let recScope   = null;   // 'cmp' | 'enr' | 'vfy'
let recSlot    = 0;
let recStream  = null;
let isRecording = false;

function recIds(scope, slot) {
  if (scope === 'cmp') return { btn:`cmp-b${slot}`, txt:`cmp-b${slot}-t`, pill:`cmp-p${slot}` };
  if (scope === 'enr') return { btn:'enr-b', txt:'enr-b-t', pill:'enr-p' };
  return { btn:'vfy-b', txt:'vfy-b-t', pill:'vfy-p' };
}

function waveHTML() {
  return `<div class="waves">${'<span class="w"></span>'.repeat(5)}</div>`;
}

async function startRec(scope, slot) {
  if (isRecording) return;
  if (event) event.preventDefault();

  const ids = recIds(scope, slot);
  isRecording = true;
  recScope = scope; recSlot = slot;
  chunks = [];

  const btn  = $(ids.btn);
  btn.classList.add('recording');
  $(ids.txt).innerHTML = waveHTML();
  const pill = $(ids.pill);
  pill.textContent = '录音中…';
  pill.className = 'pill rec';

  try {
    recStream = await navigator.mediaDevices.getUserMedia({ audio: true });
    recorder  = new MediaRecorder(recStream, { mimeType: 'audio/webm;codecs=opus' });

    recorder.ondataavailable = e => { if (e.data.size > 0) chunks.push(e.data); };
    recorder.onstop = async () => {
      const blob   = new Blob(chunks, { type: 'audio/webm' });
      const b64wav = await blobToWavB64(blob);

      // 存储
      if (scope === 'cmp') {
        audioData['cmp' + slot] = b64wav;
        refreshCmpBtn();
      } else if (scope === 'enr') {
        audioData.enr = b64wav;
        $('enr-go').disabled = false;
      } else {
        audioData.vfy = b64wav;
        $('vfy-go').disabled = false;
      }

      pill.textContent = '✓ 已录制';
      pill.className = 'pill ok';
      btn.classList.remove('recording');
      $(ids.txt).textContent = scope === 'enr' ? '按住说话（建议 3 秒以上）' : '按住说话';
      recStream.getTracks().forEach(t => t.stop());
      isRecording = false;
    };

    recorder.start();
  } catch (err) {
    pill.textContent = '麦克风权限被拒';
    pill.className = 'pill';
    btn.classList.remove('recording');
    $(ids.txt).textContent = '按住说话';
    isRecording = false;
  }
}

function stopRec(scope, slot) {
  if (event) event.preventDefault();
  if (!isRecording || !recorder || recorder.state !== 'recording') return;
  recorder.stop();
}

function refreshCmpBtn() {
  $('cmp-go').disabled = !(audioData.cmp1 && audioData.cmp2);
}

/* ═══════════════════════════════════════════════════════════
   WebM → WAV（16kHz mono）→ Base64
═══════════════════════════════════════════════════════════ */
async function blobToWavB64(blob) {
  const arrayBuf = await blob.arrayBuffer();
  const ctx      = new (window.AudioContext || window.webkitAudioContext)();
  const decoded  = await ctx.decodeAudioData(arrayBuf);

  const SR     = 16000;
  const src    = decoded.getChannelData(0);
  const ratio  = decoded.sampleRate / SR;
  const outLen = Math.floor(decoded.duration * SR);
  const pcm    = new Float32Array(outLen);

  // 线性插值重采样
  for (let i = 0; i < outLen; i++) {
    const si  = i * ratio;
    const lo  = Math.floor(si);
    const hi  = Math.min(lo + 1, src.length - 1);
    const t   = si - lo;
    pcm[i]    = src[lo] * (1 - t) + src[hi] * t;
  }

  const wavBuf = encodeWav(pcm, SR);
  const bytes  = new Uint8Array(wavBuf);
  let bin = '';
  bytes.forEach(b => bin += String.fromCharCode(b));
  return btoa(bin);
}

function encodeWav(pcm, sr) {
  const bps = 2, ch = 1;
  const buf = new ArrayBuffer(44 + pcm.length * bps);
  const v   = new DataView(buf);
  const ws  = (o, s) => { for (let i=0;i<s.length;i++) v.setUint8(o+i,s.charCodeAt(i)); };

  ws(0,'RIFF'); v.setUint32(4, 36+pcm.length*bps, true); ws(8,'WAVE');
  ws(12,'fmt '); v.setUint32(16,16,true); v.setUint16(20,1,true);
  v.setUint16(22,ch,true); v.setUint32(24,sr,true);
  v.setUint32(28,sr*ch*bps,true); v.setUint16(32,ch*bps,true);
  v.setUint16(34,bps*8,true); ws(36,'data'); v.setUint32(40,pcm.length*bps,true);

  let off = 44;
  for (let i=0; i<pcm.length; i++) {
    const s = Math.max(-1, Math.min(1, pcm[i]));
    v.setInt16(off, s<0 ? s*0x8000 : s*0x7FFF, true);
    off += 2;
  }
  return buf;
}

/* ═══════════════════════════════════════════════════════════
   API 调用
═══════════════════════════════════════════════════════════ */
const API = '/api/plugin';

function setBusy(goId, txtId, msg) {
  $(goId).disabled = true;
  $(txtId).innerHTML = `<div class="spinner"></div>${msg}`;
}
function clearBusy(goId, txtId, label, enable=true) {
  $(goId).disabled = !enable;
  $(txtId).textContent = label;
}

function showResult(box, icon, title, sub, type, iconTxt, titleTxt, subHtml) {
  const el = $(box);
  el.className = 'result ' + type + ' show';
  setText(icon, iconTxt);
  setText(title, titleTxt);
  $(sub).innerHTML = subHtml;
}

function simRow(sim, confidence) {
  return `相似度：<span class="sim-num">${(sim*100).toFixed(1)}%</span>&nbsp;&nbsp;置信度：${confidence}`;
}

/* —— 直接比对 —— */
async function doCompare() {
  setBusy('cmp-go','cmp-go-t','比对中…');
  const thr = parseFloat($('cmp-thr').value);
  try {
    const r = await fetch(`${API}/voice_compare/compare`, {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ audio1:audioData.cmp1, audio2:audioData.cmp2, threshold:thr }),
    });
    const d = await r.json();
    if (d.error)
      showResult('cmp-result','cmp-r-icon','cmp-r-title','cmp-r-sub','err','⚠️','比对出错',d.error);
    else if (d.is_same)
      showResult('cmp-result','cmp-r-icon','cmp-r-title','cmp-r-sub','same','🎉','是同一人', simRow(d.similarity,d.confidence));
    else
      showResult('cmp-result','cmp-r-icon','cmp-r-title','cmp-r-sub','diff','❌','不是同一人', simRow(d.similarity,d.confidence));
  } catch(e) {
    showResult('cmp-result','cmp-r-icon','cmp-r-title','cmp-r-sub','err','⚠️','网络错误',e.message);
  }
  clearBusy('cmp-go','cmp-go-t','开始比对', !!(audioData.cmp1&&audioData.cmp2));
}

/* —— 注册声纹 —— */
async function doEnroll() {
  setBusy('enr-go','enr-go-t','保存中…');
  try {
    const r = await fetch(`${API}/voice_compare/enroll`, {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ audio:audioData.enr }),
    });
    const d = await r.json();
    if (d.error)
      showResult('enr-result','enr-r-icon','enr-r-title','enr-r-sub','err','⚠️','注册失败',d.error);
    else
      showResult('enr-result','enr-r-icon','enr-r-title','enr-r-sub','same','✅','注册成功',
        `特征维度：${d.feature_dim}&nbsp;&nbsp;已持久化保存`);
  } catch(e) {
    showResult('enr-result','enr-r-icon','enr-r-title','enr-r-sub','err','⚠️','网络错误',e.message);
  }
  clearBusy('enr-go','enr-go-t','保存声纹', !!audioData.enr);
}

/* —— 验证声纹 —— */
async function doVerify() {
  setBusy('vfy-go','vfy-go-t','验证中…');
  try {
    const r = await fetch(`${API}/voice_compare/verify`, {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ audio:audioData.vfy }),
    });
    const d = await r.json();
    if (d.error)
      showResult('vfy-result','vfy-r-icon','vfy-r-title','vfy-r-sub','err','⚠️','验证失败',d.error);
    else if (d.is_same)
      showResult('vfy-result','vfy-r-icon','vfy-r-title','vfy-r-sub','same','🎉','验证通过，是主人！', simRow(d.similarity,d.confidence));
    else
      showResult('vfy-result','vfy-r-icon','vfy-r-title','vfy-r-sub','diff','🚫','验证未通过', simRow(d.similarity,d.confidence));
  } catch(e) {
    showResult('vfy-result','vfy-r-icon','vfy-r-title','vfy-r-sub','err','⚠️','网络错误',e.message);
  }
  clearBusy('vfy-go','vfy-go-t','开始验证', !!audioData.vfy);
}

/* —— 清除声纹 —— */
async function doClear() {
  if (!confirm('确定要清除已注册的声纹吗？此操作不可恢复。')) return;
  try {
    await fetch(`${API}/voice_compare/clear`, {
      method:'POST', headers:{'Content-Type':'application/json'}, body:'{}',
    });
    $('vfy-dot').className = 'dot off';
    $('vfy-status').textContent = '声纹已清除，请重新注册';
    showResult('vfy-result','vfy-r-icon','vfy-r-title','vfy-r-sub',
      'err','🗑️','已清除','声纹数据已删除，请前往「注册声纹」重新录制');
  } catch(e) {
    alert('清除失败：' + e.message);
  }
}

/* —— 查询注册状态 —— */
async function loadEnrollStatus() {
  try {
    const r = await fetch(`${API}/voice_compare/status`, {
      method:'POST', headers:{'Content-Type':'application/json'}, body:'{}',
    });
    const d = await r.json();
    const dot = $('vfy-dot');
    const txt = $('vfy-status');
    if (d.enrolled) {
      dot.className = 'dot on';
      txt.textContent = `已注册声纹 · 特征维度 ${d.feature_dim} · 阈值 ${d.threshold}`;
    } else {
      dot.className = 'dot off';
      txt.textContent = '尚未注册声纹，请先到「注册声纹」面板录制';
    }
  } catch {
    $('vfy-status').textContent = '无法连接插件服务';
  }
}
