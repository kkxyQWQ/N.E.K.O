<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>N.E.K.O. Subtitle</title>
    <link rel="stylesheet" href="/static/css/index.css">
    <link rel="stylesheet" href="/static/css/dark-mode.css">
    <style>
        html, body {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            background: transparent;
            overflow: hidden;
        }

        #subtitle-container {
            width: 100%; height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 4px 16px;
            cursor: grab;
        }

        #subtitle-text {
            background: rgba(0, 0, 0, 0.7);
            color: #fff;
            padding: 6px 18px;
            border-radius: 8px;
            font-size: 1rem;
            line-height: 1.4;
            text-align: center;
            max-width: 100%;
            word-break: break-word;
            backdrop-filter: blur(8px);
            transition: opacity 0.3s ease;
            opacity: 0;
            pointer-events: none;
        }

        #subtitle-text.visible {
            opacity: 1;
        }

        [data-theme="dark"] #subtitle-text {
            background: rgba(20, 20, 30, 0.85);
        }
    </style>
</head>
<body>
    <div id="subtitle-container">
        <span id="subtitle-text"></span>
    </div>

    <script>
        var subtitleText = document.getElementById('subtitle-text');
        var container = document.getElementById('subtitle-container');
        var hideTimer = null;

        // 监听转写消息和翻译消息
        window.addEventListener('neko-ws-transcript', function(e) {
            var data = e.detail;
            if (data && data.transcript) {
                subtitleText.textContent = data.transcript;
                subtitleText.classList.add('visible');
                if (hideTimer) clearTimeout(hideTimer);
                // 翻译文本显示更久
                var duration = data.translated ? 8000 : (data.is_final ? 3000 : 0);
                if (duration > 0) {
                    hideTimer = setTimeout(function() {
                        subtitleText.classList.remove('visible');
                    }, duration);
                }
            }
        });

        // JS 拖拽窗口
        if (window.nekoSubtitle && window.nekoSubtitle.getBounds) {
            var isDragging = false;
            var ready = false;
            var sx = 0, sy = 0, ox = 0, oy = 0;

            container.addEventListener('mousedown', function(e) {
                isDragging = true; ready = false;
                sx = e.screenX; sy = e.screenY;
                window.nekoSubtitle.enableInteraction();
                window.nekoSubtitle.getBounds().then(function(b) {
                    if (b) { ox = b.x; oy = b.y; }
                    ready = true;
                });
                container.style.cursor = 'grabbing';
                e.preventDefault();
            });

            document.addEventListener('mousemove', function(e) {
                if (!isDragging || !ready) return;
                window.nekoSubtitle.setPosition(ox + e.screenX - sx, oy + e.screenY - sy);
            });

            document.addEventListener('mouseup', function() {
                if (isDragging) container.style.cursor = 'grab';
                isDragging = false; ready = false;
            });
        }
    </script>
</body>
</html>
